<?xml version="1.0" encoding="UTF-8"?>
<svg width="390" height="844" viewBox="0 0 390 844"
     xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Boxing Fitness — Fat Burning Mode UI (390×844 iPhone)</title>
  <desc>燃脂模式界面 橙红活力色调。深焦糖背景，橙红拳套，心率区间，实时卡路里燃脂量，HIIT倒计时，高频ECG波形。</desc>

  <defs>
    <linearGradient id="fb_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#120400"/>
      <stop offset="100%" stop-color="#1E0800"/>
    </linearGradient>
    <linearGradient id="fb_glove_L" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#FF6622"/>
      <stop offset="100%" stop-color="#AA2200"/>
    </linearGradient>
    <linearGradient id="fb_glove_R" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FF6622"/>
      <stop offset="100%" stop-color="#AA2200"/>
    </linearGradient>
    <linearGradient id="fb_glove_hi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FF8844"/>
      <stop offset="100%" stop-color="#EE4400"/>
    </linearGradient>
    <linearGradient id="fb_cuff" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#440E00"/>
      <stop offset="100%" stop-color="#220600"/>
    </linearGradient>
    <linearGradient id="fb_hr_bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#CC2200"/>
      <stop offset="60%"  stop-color="#FF6600"/>
      <stop offset="100%" stop-color="#FFAA00"/>
    </linearGradient>
    <linearGradient id="fb_cal_bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FF4400"/>
      <stop offset="100%" stop-color="#FFCC00"/>
    </linearGradient>
    <linearGradient id="fb_btn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#CC2200"/>
      <stop offset="100%" stop-color="#FF5500"/>
    </linearGradient>
    <linearGradient id="fb_ecg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FF3300"/>
      <stop offset="40%"  stop-color="#FF8800"/>
      <stop offset="80%"  stop-color="#FFCC00"/>
      <stop offset="100%" stop-color="#FF6600"/>
    </linearGradient>
    <linearGradient id="fb_led" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FF4400"/>
      <stop offset="50%"  stop-color="#FFDD00"/>
      <stop offset="100%" stop-color="#FF4400"/>
    </linearGradient>
    <radialGradient id="fb_ring_outer" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FF4400" stop-opacity="0"/>
      <stop offset="65%"  stop-color="#FF4400" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FF4400" stop-opacity="0.30"/>
    </radialGradient>
    <radialGradient id="fb_ring_inner" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FF6600" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FF6600" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fb_press" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFAA00" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="#FF4400" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fb_center_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FF4400" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#FF4400" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── 背景 ── -->
  <rect width="390" height="844" fill="url(#fb_bg)"/>

  <!-- ── 状态栏 ── -->
  <rect x="0" y="0" width="390" height="54" fill="#0A0200" opacity="0.85"/>
  <text x="30"  y="36" font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="15" font-weight="600" fill="#AA5522" opacity="0.8">9:41</text>
  <text x="360" y="36" text-anchor="end"
        font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="13" fill="#AA5522" opacity="0.8">WiFi  🔋</text>

  <!-- ── 顶部导航 ── -->
  <text x="30"  y="96" font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="16" fill="#883300" opacity="0.8">← 返回</text>
  <text x="195" y="96" text-anchor="middle"
        font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="17" font-weight="700" fill="#FF8844">Fat Burning</text>
  <text x="360" y="96" text-anchor="end"
        font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="14" fill="#883300" opacity="0.8">记录</text>

  <!-- ── 模式副标题 ── -->
  <text x="195" y="126" text-anchor="middle"
        font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="13" fill="#AA4422">HIIT 极速闪电战 · 无氧燃脂区间</text>

  <!-- ── 心率区间进度条 ── -->
  <rect x="30" y="148" width="330" height="44" rx="22" fill="#1A0800"/>
  <rect x="30" y="148" width="277" height="44" rx="22" fill="url(#fb_hr_bar)" opacity="0.90"/>
  <text x="50"  y="176" font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="13" fill="#FFCCAA">心率区间</text>
  <text x="350" y="176" text-anchor="end"
        font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="14" font-weight="700" fill="#FFCC44">83%</text>

  <!-- ── 心率区间标签 ── -->
  <rect x="30"  y="206" width="70"  height="28" rx="14" fill="#1A0800" stroke="#441A00" stroke-width="0.8"/>
  <text x="65"  y="225" text-anchor="middle"
        font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="11" fill="#883300">热身</text>
  <rect x="110" y="206" width="70"  height="28" rx="14" fill="#1A0800" stroke="#441A00" stroke-width="0.8"/>
  <text x="145" y="225" text-anchor="middle"
        font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="11" fill="#883300">有氧</text>
  <rect x="190" y="206" width="70"  height="28" rx="14" fill="#1A0800" stroke="#441A00" stroke-width="0.8"/>
  <text x="225" y="225" text-anchor="middle"
        font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif"
