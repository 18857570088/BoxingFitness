    <rect x="6.1" y="4.3" width="72.3" height="59.8" rx="22" fill="url(#fb_glove_hi)" opacity="0.88"/>
    <rect x="0"   y="136" width="85"  height="34"  rx="17" fill="url(#fb_cuff)" opacity="0.88"/>
    <rect x="12.2" y="12.8" width="36.5" height="9.4" rx="4.7" fill="white" opacity="0.28"/>
    <rect x="12.2" y="68"  width="61"  height="4.3" rx="2.1" fill="white" opacity="0.14"/>
    <rect x="12.2" y="80"  width="61"  height="4.3" rx="2.1" fill="white" opacity="0.14"/>
    <!-- IMU芯片 -->
    <rect x="3.1"  y="9.4" width="24.4" height="24.4" rx="5.1"
          fill="#0A0200" stroke="#FFDD00" stroke-width="2.6" opacity="0.92"/>
    <circle cx="15.3" cy="21.5" r="4.5" fill="#FFDD00" opacity="0.95"/>
    <line x1="27.5" y1="21.5" x2="35"   y2="21.5" stroke="#FFDD00" stroke-width="1.8" opacity="0.70"/>
    <line x1="3.1"  y1="21.5" x2="0"    y2="21.5" stroke="#FFDD00" stroke-width="1.8" opacity="0.70"/>
    <line x1="15.3" y1="9.4"  x2="15.3" y2="4.3"  stroke="#FFDD00" stroke-width="1.8" opacity="0.70"/>
    <line x1="15.3" y1="33.8" x2="15.3" y2="38.9" stroke="#FFDD00" stroke-width="1.8" opacity="0.70"/>
    <!-- 压力传感器 -->
    <ellipse cx="42.5" cy="95.2" rx="22.4" ry="18.1" fill="url(#fb_press)" opacity="0.40"/>
    <circle cx="30.5" cy="85.8" r="3.0" fill="#FFAA44" opacity="0.70"/>
    <circle cx="42.5" cy="85.8" r="3.0" fill="#FFAA44" opacity="0.70"/>
    <circle cx="54.5" cy="85.8" r="3.0" fill="#FFAA44" opacity="0.70"/>
    <circle cx="30.5" cy="95.2" r="3.0" fill="#FFCC66" opacity="0.80"/>
    <circle cx="42.5" cy="95.2" r="4.3"  fill="#FFFFFF"  opacity="0.88"/>
    <circle cx="54.5" cy="95.2" r="3.0" fill="#FFCC66" opacity="0.80"/>
    <circle cx="30.5" cy="104.7" r="3.0" fill="#FFAA44" opacity="0.70"/>
    <circle cx="42.5" cy="104.7" r="3.0" fill="#FFAA44" opacity="0.70"/>
    <circle cx="54.5" cy="104.7" r="3.0" fill="#FFAA44" opacity="0.70"/>
    <rect x="10.2" y="140" width="65.1" height="9.4" rx="4.7" fill="url(#fb_led)" opacity="0.72"/>
    <circle cx="20"  cy="158" r="3.4" fill="#FFDD00" opacity="0.80"/>
    <circle cx="33"  cy="158" r="3.4" fill="#FF8800" opacity="0.70"/>
    <circle cx="46"  cy="158" r="3.4" fill="#FF4400" opacity="0.70"/>
  </g>

  <!-- ── 中央数据显示 ── -->
  <text x="195" y="408" text-anchor="middle"
        font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="13" fill="#884422">击打数</text>
  <text x="195" y="454" text-anchor="middle"
        font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="62" font-weight="700" fill="#FFFFFF" opacity="0.96">386</text>
  <!-- 卡路里+燃脂 -->
  <text x="195" y="480" text-anchor="middle"
        font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="14" font-weight="600" fill="#FF9944">257 kcal  ·  20.1g 脂肪</text>
  <!-- HIIT倒计时 -->
  <text x="195" y="514" text-anchor="middle"
        font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="38" font-weight="700" fill="#FF6600">00:42</text>

  <!-- ── 高频紧张 ECG 波形 ── -->
  <rect x="0" y="578" width="390" height="90" fill="#0A0200" opacity="0.60"/>
  <text x="30" y="600" font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="11" fill="#883300">声音波形 · 高频冲刺</text>
  <polyline
    points="30,648 40,648 46,628 52,665 58,615 64,648 74,648 80,648 86,638 92,648 100,648 106,648 112,628 118,665 124,615 130,648 140,648 146,648 152,638 158,648 166,648 172,648 178,628 184,665 190,615 196,648 206,648 212,648 218,638 224,648 232,648 238,648 244,628 250,665 256,615 262,648 272,648 278,648 284,638 290,648 298,648 304,648 310,628 316,665 322,615 328,648 338,648 350,648 356,638 362,648"
    fill="none" stroke="url(#fb_ecg)"
    stroke-width="2.0" stroke-linecap="round" stroke-linejoin="round" opacity="0.88"/>
  <circle cx="58"  cy="615" r="4.7" fill="#FF3300" opacity="0.90"/>
  <circle cx="124" cy="615" r="4.7" fill="#FF6600" opacity="0.90"/>
  <circle cx="190" cy="615" r="4.7" fill="#FF8800" opacity="0.90"/>
  <circle cx="256" cy="615" r="4.7" fill="#FFCC00" opacity="0.90"/>
  <circle cx="322" cy="615" r="4.7" fill="#FF6600" opacity="0.90"/>

  <!-- ── 实时数据卡片 ── -->
  <rect x="30"  y="686" width="100" height="72" rx="14" fill="#1A0800" stroke="#441A00" stroke-width="0.8"/>
  <text x="80"  y="712" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="11" fill="#884422">频率</text>
  <text x="80"  y="739" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="22" font-weight="700" fill="#FF8844">94</text>
  <text x="80"  y="754" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="10" fill="#441A00">/min</text>

  <rect x="145" y="686" width="100" height="72" rx="14" fill="#1A0800" stroke="#441A00" stroke-width="0.8"/>
  <text x="195" y="712" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="11" fill="#884422">燃脂量</text>
  <text x="195" y="739" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="22" font-weight="700" fill="#FFAA44">20.1g</text>
  <text x="195" y="754" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="10" fill="#441A00">Fat Burned</text>

  <rect x="260" y="686" width="100" height="72" rx="14" fill="#1A0800" stroke="#441A00" stroke-width="0.8"/>
  <text x="310" y="712" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="11" fill="#884422">EPOC后燃</text>
  <text x="310" y="739" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="22" font-weight="700" fill="#FFCC44">+38</text>
  <text x="310" y="754" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="10" fill="#441A00">kcal 预计</text>

  <!-- ── 提示文字 ── -->
