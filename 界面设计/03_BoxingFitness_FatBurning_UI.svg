  <!-- ── 底部按钮 ── -->
  <rect x="30"  y="804" width="155" height="52" rx="26" fill="url(#fb_btn)" opacity="0.88"/>
  <text x="107" y="836" text-anchor="middle"
        font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif"
