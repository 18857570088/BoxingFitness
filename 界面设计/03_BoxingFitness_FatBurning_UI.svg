  <rect x="270" y="206" width="70"  height="28" rx="14" fill="#CC2200" stroke="#FF4400" stroke-width="1.2"/>
  <text x="305" y="225" text-anchor="middle"
        font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="11" font-weight="700" fill="#FFDDAA">无氧 ✓</text>

  <!-- ── 主视觉区：能量圆环 ── -->
  <circle cx="195" cy="450" r="155" fill="url(#fb_ring_outer)"/>
  <circle cx="195" cy="450" r="155" fill="none" stroke="#882200"
          stroke-width="1.4" stroke-dasharray="12.8,19.2" opacity="0.45"/>
  <circle cx="195" cy="450" r="112" fill="url(#fb_ring_inner)"/>
  <circle cx="195" cy="450" r="112" fill="none" stroke="#FF4400" stroke-width="2.6" opacity="0.20"/>
  <circle cx="195" cy="450" r="78"  fill="url(#fb_center_glow)"/>

  <!-- ── LEFT GLOVE（橙红）── -->
  <g transform="translate(195,450) rotate(-22) translate(-85,-112)">
    <rect x="0"   y="51"  width="85"  height="119" rx="24" fill="url(#fb_glove_L)" opacity="0.92"/>
    <rect x="6.1" y="4.3" width="72.3" height="59.8" rx="22" fill="url(#fb_glove_hi)" opacity="0.88"/>
    <rect x="0"   y="136" width="85"  height="34"  rx="17" fill="url(#fb_cuff)" opacity="0.88"/>
    <rect x="12.2" y="12.8" width="36.5" height="9.4" rx="4.7" fill="white" opacity="0.28"/>
    <rect x="12.2" y="68"  width="61"  height="4.3" rx="2.1" fill="white" opacity="0.14"/>
    <rect x="12.2" y="80"  width="61"  height="4.3" rx="2.1" fill="white" opacity="0.14"/>
    <!-- IMU芯片 -->
    <rect x="57.5" y="9.4" width="24.4" height="24.4" rx="5.1"
          fill="#0A0200" stroke="#FFDD00" stroke-width="2.6" opacity="0.92"/>
    <circle cx="69.7" cy="21.5" r="4.5" fill="#FFDD00" opacity="0.95"/>
    <line x1="57.5" y1="21.5" x2="50"   y2="21.5" stroke="#FFDD00" stroke-width="1.8" opacity="0.70"/>
    <line x1="81.9" y1="21.5" x2="85"   y2="21.5" stroke="#FFDD00" stroke-width="1.8" opacity="0.70"/>
    <line x1="69.7" y1="9.4"  x2="69.7" y2="4.3"  stroke="#FFDD00" stroke-width="1.8" opacity="0.70"/>
    <line x1="69.7" y1="33.8" x2="69.7" y2="38.9" stroke="#FFDD00" stroke-width="1.8" opacity="0.70"/>
    <!-- 压力传感器 -->
    <ellipse cx="42.5" cy="95.2" rx="22.4" ry="18.1" fill="url(#fb_press)" opacity="0.40"/>
    <circle cx="30.5" cy="85.8" r="3.0" fill="#FFAA44" opacity="0.70"/>
    <circle cx="42.5" cy="85.8" r="3.0" fill="#FFAA44" opacity="0.70"/>
    <circle cx="54.5" cy="85.8" r="3.0" fill="#FFAA44" opacity="0.70"/>
    <circle cx="30.5" cy="95.2" r="3.0" fill="#FFCC66" opacity="0.80"/>
    <circle cx="42.5" cy="95.2" r="4.3"  fill="#FFFFFF"  opacity="0.88"/>
    <circle cx="54.5" cy="95.2" r="3.0" fill="#FFCC66" opacity="0.80"/>
    <circle cx="30.5" cy="104.7" r="3.0" fill="#FFAA44" opacity="0.70"/>
    <circle cx="42.5" cy="104.7" r="3.0" fill="#FFAA44" opacity="0.70"/>
    <circle cx="54.5" cy="104.7" r="3.0" fill="#FFAA44" opacity="0.70"/>
    <!-- 护腕LED -->
    <rect x="10.2" y="140" width="65.1" height="9.4" rx="4.7" fill="url(#fb_led)" opacity="0.72"/>
    <!-- 护腕状态灯 -->
    <circle cx="20"  cy="158" r="3.4" fill="#FFDD00" opacity="0.80"/>
    <circle cx="33"  cy="158" r="3.4" fill="#FF8800" opacity="0.70"/>
    <circle cx="46"  cy="158" r="3.4" fill="#FF4400" opacity="0.70"/>
  </g>

  <!-- ── RIGHT GLOVE ── -->
  <g transform="translate(195,450) rotate(22) translate(0,-112)">
